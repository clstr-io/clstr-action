name: Test
description: Test coding challenges with clstr

inputs:
  working-directory:
    description: Directory containing clstr.state
    required: false
    default: '.'
  clstr-version:
    description: Version of clstr to install
    required: false
    default: 'v0.3.0'

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Cache clstr
      uses: actions/cache@v5
      id: cache-clstr
      with:
        path: ~/go/bin/clstr
        key: clstr-${{ runner.os }}-${{ runner.arch }}-${{ inputs.clstr-version }}

    - name: Install clstr
      if: steps.cache-clstr.outputs.cache-hit != 'true'
      shell: bash
      run: go install github.com/clstr-io/clstr/cmd/clstr@${{ inputs.clstr-version }}

    - name: Run tests
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ github.action_path }}/test.sh
